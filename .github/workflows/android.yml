name: Build Android APK

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sync Capacitor (copy web assets → android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Read version from package.json and inject into build.gradle
      - name: Inject version from package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD_NUMBER=${{ github.run_number }}
          echo "App version: $VERSION (build $BUILD_NUMBER)"
          sed -i "s/versionCode [0-9]*/versionCode $BUILD_NUMBER/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" android/app/build.gradle

      # Write keystore from secret before Gradle build so release signing works.
      # If the secret is absent (e.g. fork PR), the file won't be created and
      # build.gradle falls back to an unsigned APK automatically.
      - name: Write release keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > android/app/release.keystore
          fi

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Locate APK
        run: |
          SIGNED=android/app/build/outputs/apk/release/app-release.apk
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          if [ -f "$SIGNED" ]; then
            echo "APK_FILE=$SIGNED" >> $GITHUB_ENV
          else
            echo "APK_FILE=$UNSIGNED" >> $GITHUB_ENV
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: WorshipNote-v${{ github.run_number }}
          path: ${{ env.APK_FILE }}
          retention-days: 30

      - name: Create GitHub Release on master push
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "WorshipNote v${{ github.run_number }}"
          body: |
            ## WorshipNote Release

            Built from commit ${{ github.sha }}

            ### Install / Update on Android

            **First-time install:**
            1. Download `app-release*.apk`
            2. On your Android device go to **Settings → Security → Install unknown apps** and allow your browser or file manager
            3. Open the APK and tap Install

            **Updating (if keystore signing is configured):**
            - Download and install the new APK directly over the old one — no uninstall needed!
            - The app data (songs, settings) is preserved automatically.

            **If you see "Package conflict" error:**
            - This means the previous APK was unsigned or signed with a different key.
            - Uninstall the old app first (songs are backed up in your browser's localStorage).
            - **Export your songs first** via Settings → Export Songs (JSON) to preserve your data.
            - Then install the new APK.
            - See the repository README for how to configure keystore signing to avoid this in future.

            ### What's new in this build
            See [CHANGELOG](../../blob/master/CHANGELOG.md) for details.
          files: ${{ env.APK_FILE }}
          prerelease: false
