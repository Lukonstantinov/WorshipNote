name: Build Android APK

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sync Capacitor (copy web assets → android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Read version from package.json and inject into build.gradle
      - name: Inject version from package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD_NUMBER=${{ github.run_number }}
          echo "App version: $VERSION (build $BUILD_NUMBER)"
          sed -i "s/versionCode [0-9]*/versionCode $BUILD_NUMBER/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" android/app/build.gradle

      - name: Generate debug keystore (if missing)
        run: |
          mkdir -p android/app
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore android/app/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Configure signing in build.gradle
        run: |
          python3 - <<'EOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing_config = """
              signingConfigs {
                  release {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
              }
          """

          # Insert signingConfigs before buildTypes if not already present
          if 'signingConfigs' not in content:
              content = content.replace('    buildTypes {', signing_config + '    buildTypes {')

          # Add signingConfig to release buildType
          content = re.sub(
              r'(release \{[^}]*?)(minifyEnabled)',
              r'\1signingConfig signingConfigs.release\n            \2',
              content,
              flags=re.DOTALL
          )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle updated with signing config")
          EOF

      - name: Build signed Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: WorshipHub-v${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release on master push
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "WorshipNote v${{ github.run_number }}"
          body: |
            ## WorshipNote Release

            Built from commit ${{ github.sha }}

            **Install on Android:**
            1. Download `WorshipNote-v${{ github.run_number }}.apk`
            2. On your Android device, go to **Settings → Security → Install unknown apps** and allow your file manager or browser
            3. Open the downloaded APK file and tap Install
          files: android/app/build/outputs/apk/release/app-release.apk
          prerelease: false
