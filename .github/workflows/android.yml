name: Build Android APK

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sync Capacitor (copy web assets → android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Read version from package.json and inject into build.gradle
      - name: Inject version from package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD_NUMBER=${{ github.run_number }}
          # Parse semantic version for versionName
          echo "App version: $VERSION (build $BUILD_NUMBER)"
          # Update versionCode (always incrementing) and versionName from package.json
          sed -i "s/versionCode [0-9]*/versionCode $BUILD_NUMBER/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" android/app/build.gradle

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: WorshipHub-v${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create GitHub Release on master push
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "WorshipNote v${{ github.run_number }}"
          body: |
            ## WorshipNote Release

            Built from commit ${{ github.sha }}

            **Install on Android:**
            1. Download `app-release-unsigned.apk`
            2. On your Android device, go to **Settings → Security → Install unknown apps** and allow your file manager or browser
            3. Open the downloaded APK file and tap Install

            > Note: This is an unsigned release APK. It works on all Android devices but requires allowing installs from unknown sources once.
          files: android/app/build/outputs/apk/release/app-release-unsigned.apk
          prerelease: false
